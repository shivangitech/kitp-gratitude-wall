<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KITP Gratitude Wall - Single Page Application</title>
    <!-- Use Tailwind CSS CDN for quick and clean styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Small styling for smoother transitions */
        .page-transition {
            transition: opacity 0.3s ease-in-out;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 flex flex-col min-h-screen">

    <!-- HEADER / NAVIGATION -->
    <header class="bg-white shadow-md sticky top-0 z-50">
        <nav class="max-w-7xl mx-auto px-6 py-3 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <!-- Using college logo from prompt reference -->
                <img src="image_0.png" alt="Kanpur Institute of Technology Logo" class="h-16 w-auto">
                <div class="flex flex-col">
                    <span class="text-xl font-bold text-blue-900 leading-tight">KITP</span>
                    <span class="text-sm font-medium text-gray-600">Kanpur Institute of Technology and Pharmacy</span>
                </div>
            </div>
            <div class="flex gap-1">
                <a href="#wall" class="text-gray-700 hover:text-blue-700 px-4 py-2 font-medium">Gratitude Wall</a>
                <a href="#stories" class="text-gray-700 hover:text-blue-700 px-4 py-2 font-medium">Campus Stories</a>
                <a href="#about" class="bg-blue-600 text-white hover:bg-blue-700 px-5 py-2 font-semibold rounded-full">About</a>
            </div>
        </nav>
    </header>

    <!-- MAIN SPA CONTENT AREA -->
    <main class="flex-grow container mx-auto p-6 md:p-10 page-transition" id="main-content">
        <!-- SPA CONTENT GENERATED HERE VIA JAVASCRIPT -->
    </main>

    <!-- FOOTER -->
    <footer class="bg-blue-950 text-blue-100 py-10 mt-10">
        <div class="max-w-7xl mx-auto px-6 text-center">
            <h4 class="text-lg font-bold">Kanpur Institute of Technology and Pharmacy (KITP)</h4>
            <p class="text-sm mt-2 text-blue-300">"Nostalgia and Connection Hub - Project by a BCA Student"</p>
            <div class="flex justify-center gap-6 mt-6">
                <span class="text-sm">Contact</span>
                <span class="text-sm">Website</span>
                <span class="text-sm">Alumni Hub</span>
            </div>
        </div>
    </footer>

    <!-- JAVASCRIPT FOR SPA LOGIC -->
    <script>
        // Data sources (mocked for simplicity - connect to an actual backend in a real project)
        const gratitudeData = [
            { recipient: "HOD BCA Sir", message: "Thank you for always guiding us, especially during the project phase. Your mentorship means a lot!", sender: "Raman (Batch '24)" },
            { recipient: "Canteen Bhaiya", message: "Shukriya unlimited chai ke liye exam prep ke dauraan!", sender: "Anonymous" },
            { recipient: "Physics Dept", message: "The lab practicals were challenging but so rewarding! Thanks to all the professors.", sender: "Anjali" },
            { recipient: "Verma Sir", message: "Class of 2023 says thank you! Your Java lectures were unforgettable.", sender: "Vikram S." }
        ];

        // Content generation functions for each page (view)
        const pages = {
            'wall': () => {
                let html = `
                    <div class="flex justify-between items-center mb-10">
                        <h1 class="text-4xl font-extrabold text-blue-900 flex items-center gap-3">
                            <span class="text-3xl">💖</span>
                            The Gratitude Wall
                        </h1>
                        <button class="bg-yellow-400 text-blue-950 px-6 py-3 font-bold rounded-full shadow-lg hover:scale-105 transition">
                            + Share a Note
                        </button>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                `;
                gratitudeData.forEach(item => {
                    html += `
                        <div class="bg-white p-7 rounded-2xl shadow-sm border border-gray-100 hover:shadow-lg transition">
                            <p class="text-gray-700 italic text-base leading-relaxed mb-6">"${item.message}"</p>
                            <div class="flex justify-between items-center text-xs font-semibold tracking-wide">
                                <span class="text-blue-800 bg-blue-100 px-3 py-1 rounded-full">To: ${item.recipient}</span>
                                <span class="text-gray-600">- By ${item.sender}</span>
                            </div>
                        </div>
                    `;
                });
                html += `</div>`;
                return html;
            },
            'stories': () => {
                return `
                    <h1 class="text-4xl font-extrabold text-blue-900 mb-10">Campus Stories: Life at KITP</h1>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
                        <div class="bg-white p-8 rounded-2xl shadow-sm border border-gray-100 flex gap-6 items-center">
                            <img src="https://via.placeholder.com/120x120?text=Library" alt="Library" class="h-24 w-24 rounded-full">
                            <div>
                                <h3 class="text-xl font-bold text-gray-900">Quiet Library Moments</h3>
                                <p class="text-sm text-gray-600 mt-2">A story about finding peace and focused study among the shelves of the KITP central library.</p>
                                <a href="#" class="text-blue-600 font-medium text-sm mt-3 inline-block">Read More →</a>
                            </div>
                        </div>
                         <div class="bg-white p-8 rounded-2xl shadow-sm border border-gray-100 flex gap-6 items-center">
                            <img src="https://via.placeholder.com/120x120?text=Canteen" alt="Canteen" class="h-24 w-24 rounded-full">
                            <div>
                                <h3 class="text-xl font-bold text-gray-900">The Canteen Diaries</h3>
                                <p class="text-sm text-gray-600 mt-2">Reliving the laughter, friendships, and the iconic cutting chai moments at the college canteen.</p>
                                <a href="#" class="text-blue-600 font-medium text-sm mt-3 inline-block">Read More →</a>
                            </div>
                        </div>
                    </div>
                `;
            },
            'about': () => {
                return `
                    <div class="bg-white p-12 rounded-3xl shadow-xl max-w-4xl mx-auto border border-gray-50 text-center">
                        <img src="image_0.png" alt="KITP Logo" class="h-24 w-auto mx-auto mb-8">
                        <h1 class="text-4xl font-bold text-blue-950 mb-6">About this Community Hub</h1>
                        <p class="text-lg text-gray-700 leading-relaxed max-w-2xl mx-auto">
                            This Single Page Application was created by a dedicated <strong class="text-blue-800">BCA student</strong> as part of a final project. Its purpose is to provide a dedicated space for the past and present community of Kanpur Institute of Technology and Pharmacy (KITP) to share appreciation (gratitude) and campus stories, fostering nostalgia and lasting connections.
                        </p>
                        <p class="text-md text-gray-500 mt-8">Made with ❤️ by a BCA Student, Batch of 2024</p>
                    </div>
                `;
            }
        };

        // SPA Navigation Logic
        const mainContent = document.getElementById('main-content');
        const navLinks = document.querySelectorAll('nav a');

        function navigate(hash) {
            // Remove '#' from hash to get page name
            const pageName = hash.replace('#', '') || 'wall'; // default page

            // Update content area
            mainContent.innerHTML = pages[pageName]();

            // Set active link style
            navLinks.forEach(link => link.classList.remove('text-blue-700'));
            const activeLink = Array.from(navLinks).find(link => link.getAttribute('href') === hash);
            if (activeLink) activeLink.classList.add('text-blue-700');
        }

        // Handle initial load and browser back button
        window.addEventListener('hashchange', () => navigate(window.location.hash));
        window.addEventListener('load', () => navigate(window.location.hash || '#wall'));
    </script>
</body>
</html>
