<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KITP Community Hub & Gratitude Wall</title>
    <!-- Tailwind CSS for modern design -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen flex flex-col">

    <!-- Navbar Section -->
    <nav class="bg-white/80 backdrop-blur-md sticky top-0 z-40 border-b border-slate-100 shadow-sm transition-all">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-20 items-center">
                <div class="flex items-center gap-3">
                    <!-- College Logo Integration -->
                    <img src="image_0.png" alt="KITP Logo" class="h-12 w-auto object-contain onerror="this.src='https://via.placeholder.com/50?text=KITP'">
                    <div>
                        <span class="font-extrabold text-xl tracking-tight bg-gradient-to-r from-blue-900 to-indigo-700 bg-clip-text text-transparent">KITP Connect</span>
                        <p class="text-[10px] text-slate-500 font-semibold tracking-wider uppercase">Community Hub</p>
                    </div>
                </div>
                <div class="flex gap-1 bg-slate-100 p-1.5 rounded-full text-sm font-medium">
                    <a href="#wall" class="px-5 py-2.5 rounded-full text-slate-600 hover:text-slate-900 transition-all duration-200">The Wall</a>
                    <a href="#stories" class="px-5 py-2.5 rounded-full text-slate-600 hover:text-slate-900 transition-all duration-200">Campus Stories</a>
                    <a href="#about" class="px-5 py-2.5 rounded-full text-slate-600 hover:text-slate-900 transition-all duration-200">About Hub</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Dynamic Content Area -->
    <main class="flex-grow max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-12" id="main-content">
        <!-- Content will be injected here by JavaScript -->
    </main>

    <!-- Modal Form Popup for Adding a Note -->
    <div id="messageModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden flex items-center justify-center z-50 p-4 transition-all animate-fade-in">
        <div class="bg-white w-full max-w-md p-8 rounded-3xl shadow-2xl border border-slate-100 transform scale-100 transition-all">
            <div class="flex justify-between items-center mb-6">
                <div>
                    <h3 class="text-2xl font-bold text-slate-900">Share Your Gratitude 💖</h3>
                    <p class="text-xs text-slate-500 mt-1">Leave a nice note for someone at KITP</p>
                </div>
                <button onclick="toggleModal()" class="text-slate-400 hover:text-slate-600 bg-slate-100 p-2 rounded-full transition">&times;</button>
            </div>
            
            <form id="gratitudeForm" onsubmit="submitMessage(event)" class="space-y-5">
                <div>
                    <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-2" for="recipient">To (Recipient Name / Department)</label>
                    <input type="text" id="recipient" required placeholder="e.g., HOD BCA Sir, Canteen Bhaiya, Gaurav Sir" 
                        class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-600 focus:bg-white transition text-sm">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-2" for="message">Your Message</label>
                    <textarea id="message" required rows="4" placeholder="Write your heartfelt appreciation here..." 
                        class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-600 focus:bg-white transition text-sm resize-none"></textarea>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-2" for="sender">From (Your Name)</label>
                    <input type="text" id="sender" placeholder="Your Name (Leave blank for Anonymous)" 
                        class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-600 focus:bg-white transition text-sm">
                </div>
                <button type="submit" class="w-full bg-gradient-to-r from-blue-900 to-indigo-800 text-white font-bold py-4 rounded-xl shadow-lg hover:shadow-indigo-900/20 hover:scale-[1.02] active:scale-[0.98] transition duration-200 text-sm tracking-wide">
                    Post on the Wall 🎉
                </button>
            </form>
        </div>
    </div>

    <!-- Footer Section -->
    <footer class="bg-white border-t border-slate-100 py-6 text-center text-xs font-medium text-slate-400">
        &copy; 2026 KITP Community Hub. Engineered with Passion by a BCA Student.
    </footer>

    <!-- JavaScript Logic Section -->
    <script>
        // Well-filled initial data sources to make the site look populated
        const gratitudeData = [
            { recipient: "HOD BCA Sir", message: "Thank you for always guiding us, especially during the major project phase. Your technical mentorship and push for excellence really made a difference in our careers!", sender: "Raman (Batch '24)" },
            { recipient: "Canteen Bhaiya", message: "Shukriya exam prep ke dauraan vo unlimited cutting chai aur late night maggi ke liye! Aapke bina college life boring ho jati.", sender: "Anonymous Junior" },
            { recipient: "Gaurav Sir (Java Dept)", message: "The way you explained Object-Oriented Programming concepts with real-world examples was unforgettable. Best coding classes ever!", sender: "Anjali Singh" },
            { recipient: "KITP Central Library Team", message: "Thank you for creating such a peaceful environment and always helping us find the best research papers and textbooks before the semester exams.", sender: "B.Pharm Student" },
            { recipient: "Verma Sir", message: "Class of 2025 says thank you! Your career guidance and soft skills placement classes gave us immense confidence for the campus drives.", sender: "Vikram S." },
            { recipient: "My Awesome Batchmates", message: "Shoutout to the entire BCA batch! From mass bunks to proxy attendance and proxy coding submissions, we created the best memories together.", sender: "A Proud Backbencher" }
        ];

        // Content templates for the website views
        const pages = {
            'wall': () => `
                <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6 mb-12">
                    <div>
                        <h1 class="text-3xl md:text-4xl font-extrabold tracking-tight text-slate-900 flex items-center gap-3">
                            <span class="animate-pulse">💖</span> The Gratitude Wall
                        </h1>
                        <p class="text-sm text-slate-500 mt-2">A beautiful digital space filled with appreciation and love from students to faculty and staff.</p>
                    </div>
                    <button onclick="toggleModal()" class="bg-gradient-to-r from-amber-400 to-amber-500 text-slate-950 px-7 py-3.5 font-bold rounded-full shadow-md hover:shadow-lg hover:scale-105 active:scale-95 transition-all duration-200 cursor-pointer text-sm tracking-wide">
                        + Share a Note
                    </button>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8" id="message-grid">
                    ${gratitudeData.map(item => `
                        <div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-100 hover:shadow-xl hover:-translate-y-1 transition-all duration-300 flex flex-col justify-between relative overflow-hidden group">
                            <div class="absolute top-0 left-0 w-2 h-full bg-gradient-to-b from-blue-900 to-indigo-600 opacity-0 group-hover:opacity-100 transition-opacity"></div>
                            <p class="text-slate-700 italic text-[15px] leading-relaxed mb-6 font-medium">"${item.message}"</p>
                            <div class="flex justify-between items-center text-xs font-bold pt-4 border-t border-slate-50">
                                <span class="text-blue-900 bg-blue-50/80 px-3 py-1.5 rounded-lg tracking-wide">To: ${item.recipient}</span>
                                <span class="text-slate-400 font-medium">- By ${item.sender}</span>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `,
            'stories': () => `
                <div class="mb-12">
                    <h1 class="text-3xl md:text-4xl font-extrabold tracking-tight text-slate-900">Campus Stories: Life at KITP</h1>
                    <p class="text-sm text-slate-500 mt-2">Reliving the iconic spots, events, and beautiful nostalgia of the Kanpur Institute campus.</p>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-100 flex flex-col sm:flex-row gap-6 items-center hover:shadow-md transition">
                        <img src="https://images.unsplash.com/photo-1541339907198-e08756dedf3f?w=400&auto=format&fit=crop&q=60" alt="Library" class="h-28 w-28 rounded-2xl object-cover shadow-inner">
                        <div>
                            <span class="text-[10px] font-extrabold uppercase tracking-widest text-indigo-600 bg-indigo-50 px-2 py-1 rounded">Academics</span>
                            <h3 class="text-xl font-bold text-slate-900 mt-2">Quiet Library Chronicles</h3>
                            <p class="text-sm text-slate-500 mt-2 leading-relaxed">Finding peace, internal exam notes, and high-focus group studies among the massive bookshelves of the central library.</p>
                        </div>
                    </div>
                    <div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-100 flex flex-col sm:flex-row gap-6 items-center hover:shadow-md transition">
                        <img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=400&auto=format&fit=crop&q=60" alt="Canteen" class="h-28 w-28 rounded-2xl object-cover shadow-inner">
                        <div>
                            <span class="text-[10px] font-extrabold uppercase tracking-widest text-amber-600 bg-amber-50 px-2 py-1 rounded">Campus Life</span>
                            <h3 class="text-xl font-bold text-slate-900 mt-2">The Canteen Diaries</h3>
                            <p class="text-sm text-slate-500 mt-2 leading-relaxed">The legendary laughter, internal gossip, birthdays celebrations, and endless orders of hot samosas and cutting chai.</p>
                        </div>
                    </div>
                </div>
            `,
            'about': () => `
                <div class="bg-white p-12 rounded-3xl shadow-xl max-w-3xl mx-auto border border-slate-100 text-center relative overflow-hidden">
                    <div class="absolute top-0 inset-x-0 h-2 bg-gradient-to-r from-blue-900 via-indigo-600 to-amber-400"></div>
                    <img src="image_0.png" alt="KITP Logo" class="h-24 w-auto mx-auto mb-8 object-contain" onerror="this.src='https://via.placeholder.com/100?text=KITP'">
                    <h1 class="text-3xl font-extrabold text-slate-900 mb-4">About this Community Hub</h1>
                    <p class="text-base text-slate-600 leading-relaxed max-w-xl mx-auto font-medium">
                        This beautiful Single Page Application (SPA) was designed and coded by a passionate <strong class="text-blue-900 font-bold">BCA Student (Batch of 2024)</strong> as a capstone project. It serves as a permanent community space for the alumni, students, and respected teachers of Kanpur Institute of Technology and Pharmacy to preserve memories and gratitude.
                    </p>
                    <div class="mt-8 pt-8 border-t border-slate-100 flex justify-center gap-8 text-xs font-bold text-slate-400">
                        <div>TECH STACK: <span class="text-slate-600 ml-1">HTML5 / TailwindCSS / Pure JS</span></div>
                        <div>HOSTING: <span class="text-slate-600 ml-1">GitHub Pages</span></div>
                    </div>
                </div>
            `
        };

        // Modal Functionality
        function toggleModal() {
            const modal = document.getElementById('messageModal');
            if (modal) modal.classList.toggle('hidden');
        }

        // Handle Submission
        function submitMessage(event) {
            event.preventDefault();
            const recipient = document.getElementById('recipient').value.trim();
            const message = document.getElementById('message').value.trim();
            let sender = document.getElementById('sender').value.trim();
            
            if (!sender) sender = 'Anonymous';
            
            gratitudeData.unshift({ recipient, message, sender });
            navigate(window.location.hash || '#wall');
            
            document.getElementById('gratitudeForm').reset();
            toggleModal();
        }

        // SPA Router Navigation Engine
        function navigate(hash) {
            const pageName = hash.replace('#', '') || 'wall';
            const mainContent = document.getElementById('main-content');
            const navLinks = document.querySelectorAll('nav a');
            
            if (mainContent && pages[pageName]) {
                mainContent.innerHTML = pages[pageName]();
            }

            // Sync and color active links
            navLinks.forEach(link => {
                const linkHash = link.getAttribute('href');
                if (linkHash === hash || (linkHash === '#wall' && !hash)) {
                    link.classList.remove('text-slate-600');
                    link.classList.add('text-blue-900', 'bg-white', 'shadow-sm', 'font-bold');
                } else {
                    link.classList.remove('text-blue-900', 'bg-white', 'shadow-sm', 'font-bold');
                    link.classList.add('text-slate-600');
                }
            });
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Listeners for load and tab switching
        window.addEventListener('hashchange', () => navigate(window.location.hash));
        window.addEventListener('load', () => navigate(window.location.hash || '#wall'));
    </script>
</body>
</html>
